spring.application.name=tattoo-scheduler

# JPA / Hibernate Settings (database URL is provided by Testcontainers)
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Optional: Reduce noise in logs
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# prevents the main data.sql from running during tests
spring.sql.init.mode=never

# JWT Configuration
jwt.secret=YourVeryLongAndSecureSecretKeyForDevelopmentOnly123!ChangeInProduction
jwt.expiration-ms=86400000

testcontainers.reuse.enable=true