spring.application.name=tattoo-scheduler
# -----------------------------------------------------
# INITIALIZATION ORDER:
# 1. Hibernate drops/recreates tables (ddl-auto=create-drop)
# 2. Hibernate creates tables from entities
# 3. data.sql runs to populate test data
# -----------------------------------------------------

# Ensures data.sql runs AFTER Hibernate creates tables
# =====================================================
# Enables SQL script initialization for non-embedded databases
spring.sql.init.mode=always
# Specifies the exact script file
spring.sql.init.data-locations=classpath:data.sql
# Delays data.sql execution until after Hibernate schema creation
spring.jpa.defer-datasource-initialization=true

# Database Connection
spring.datasource.url=jdbc:postgresql://localhost:5432/tattoo_scheduler
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Settings
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Optional: Reduce noise in logs
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Artist configuration
app.artist.default-id=1

# JWT Configuration
jwt.secret=YourVeryLongAndSecureSecretKeyForDevelopmentOnly123!ChangeInProduction
jwt.expiration-ms=86400000