spring.application.name=tattoo-scheduler

# SQL initialization
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data.sql
spring.jpa.defer-datasource-initialization=true

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/tattoo_scheduler
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Logging
logging.level.org.hibernate.SQL=INFO
logging.level.com.tattoo.scheduler=INFO

# App config
app.artist.default-id=1

# JWT config (change secret in production!)
jwt.secret=YourVeryLongAndSecureSecretKeyForDevelopmentOnly123!ChangeInProduction
jwt.expiration-ms=86400000